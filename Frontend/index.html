<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Insta Downloader</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        
        /* App Layout */
        .app-container { display: flex; flex-direction: column; height: 100vh; }
        
        /* Instagram Feed Section */
        #insta-frame { flex: 1; width: 100%; border: none; }

        /* Control Bar */
        .controls { 
            height: 60px; background: #fff; border-top: 2px solid #efefef; 
            display: flex; align-items: center; justify-content: center; padding: 0 15px;
        }

        .download-btn { 
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            color: white; border: none; padding: 12px 25px; border-radius: 25px;
            font-weight: bold; cursor: pointer; font-size: 14px;
        }

        /* The "Selection Box" Pop-up (Modal) */
        .modal { 
            display: none; position: fixed; bottom: 0; left: 0; width: 100%; 
            height: 70%; background: white; border-top-left-radius: 20px; 
            border-top-right-radius: 20px; box-shadow: 0 -5px 15px rgba(0,0,0,0.2); 
            z-index: 1000; padding: 20px; overflow-y: auto;
        }

        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .close-btn { font-size: 24px; cursor: pointer; color: #333; }

        .image-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .image-item { position: relative; }
        .image-item img { width: 100%; border-radius: 8px; border: 1px solid #ddd; }
        .image-item input { position: absolute; top: 5px; right: 5px; width: 20px; height: 20px; }

        .save-btn { width: 100%; background: #0095f6; color: white; padding: 15px; border: none; border-radius: 10px; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <iframe id="insta-frame" src="https://www.instagram.com"></iframe>

    <div class="controls">
        <button class="download-btn" onclick="openSelectionBox()">Extract Images</button>
    </div>
</div>

<div id="selectionBox" class="modal">
    <div class="modal-header">
        <h3>Select Images to Download</h3>
        <span class="close-btn" onclick="closeBox()">&times;</span>
    </div>
    <div class="image-grid" id="imageGrid">
        </div>
    <button class="save-btn" onclick="downloadSelected()">Download Selected</button>
</div>

<script>
    function openSelectionBox() {
        document.getElementById('selectionBox').style.display = 'block';
        
        // Sample data: Aslya prakare tumhala Instagram chya logic madhun images milavavyat lagtil
        let grid = document.getElementById('imageGrid');
        grid.innerHTML = ""; // Clear karnyathi
        
        // Example sathi 3 images (Ithe tumche logic yeil)
        for(let i=1; i<=3; i++) {
            grid.innerHTML += `
                <div class="image-item">
                    <input type="checkbox" class="img-select">
                    <img src="https://via.placeholder.com/150?text=Image+${i}" alt="Insta Post">
                </div>
            `;
        }
    }

    function closeBox() {
        document.getElementById('selectionBox').style.display = 'none';
    }

    function downloadSelected() {
        alert("Selected images gallery madhe save hotil!");
        closeBox();
    }
</script>

</body>
</html>
