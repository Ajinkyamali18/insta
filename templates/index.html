<!DOCTYPE html>
<html>
<head>
  <title>Insta Down</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #fafafa;
    }

    .header {
      background: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
      border-bottom: 1px solid #ddd;
    }

    /* 🔴 STORIES */
    .stories {
      display: flex;
      overflow-x: auto;
      padding: 10px;
      background: white;
      border-bottom: 1px solid #ddd;
    }

    .story {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 3px solid #ff004f;
      margin-right: 10px;
    }

    /* 📸 POSTS */
    .feed {
      max-width: 400px;
      margin: auto;
    }

    .post {
      background: white;
      margin: 15px 0;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 10px;
    }

    .username {
      font-weight: bold;
      margin-bottom: 5px;
    }

    .btn {
      margin-top: 10px;
      padding: 10px;
      background: #0095f6;
      color: white;
      border: none;
      width: 100%;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<div class="header">INSTA DOWN</div>

<!-- 🔴 Stories UI -->
<div class="stories" id="stories"></div>

<!-- 📸 Feed -->
<div class="feed" id="feed"></div>

<script>
// 🔴 Dummy Stories
for (let i = 0; i < 10; i++) {
  let story = document.createElement("div");
  story.className = "story";
  document.getElementById("stories").appendChild(story);
}

// 📸 Sample Posts (तू backend मधून replace करू शकतोस)
let posts = [
  {user:"user1", url:"https://www.instagram.com/p/ABC123/"},
  {user:"user2", url:"https://www.instagram.com/p/XYZ456/"}
];

// Load Posts
function loadPosts() {
  const feed = document.getElementById("feed");

  posts.forEach(p => {
    const post = document.createElement("div");
    post.className = "post";

    post.innerHTML = `
      <div class="username">${p.user}</div>
      <div>${p.url}</div>
      <button class="btn" onclick="downloadPost('${p.url}')">Download</button>
    `;

    feed.appendChild(post);
  });
}

loadPosts();

// 🔥 Copy link = auto download
document.addEventListener("paste", function (e) {
  const text = (e.clipboardData || window.clipboardData).getData("text");

  if (text.includes("instagram.com")) {
    downloadPost(text);
  }
});

// 🔽 Download API
function downloadPost(url) {
  fetch("/download", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ url: url })
  })
  .then(res => res.json())
  .then(data => {
    alert("Status: " + data.status);
  });
}

// 🔄 Infinite scroll
window.addEventListener("scroll", () => {
  if (window.innerHeight + window.scrollY >= document.body.offsetHeight) {
    loadPosts();
  }
});
</script>

</body>
</html>
