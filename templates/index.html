<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Personal Insta Saver</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica; background-color: #fafafa; margin: 0; padding: 0; }
        .header { background: white; padding: 15px; border-bottom: 1px solid #dbdbdb; text-align: center; font-weight: bold; }
        .container { padding: 20px; text-align: center; }
        input { width: 90%; padding: 12px; border: 1px solid #dbdbdb; border-radius: 8px; font-size: 16px; margin-bottom: 15px; }
        button { background-color: #0095f6; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; font-size: 14px; width: 95%; }
        
        /* The Selection Box (Modal) */
        #selectionBox { display: none; position: fixed; bottom: 0; left: 0; width: 100%; height: 75%; background: white; border-top-left-radius: 20px; border-top-right-radius: 20px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 1000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .grid-item { position: relative; border-radius: 10px; overflow: hidden; border: 1px solid #eee; }
        .grid-item img { width: 100%; display: block; }
        .dl-btn { background: rgba(255,255,255,0.9); color: #333; position: absolute; bottom: 5px; right: 5px; padding: 5px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; text-decoration: none; border: 1px solid #ccc; }
        .close-bar { width: 40px; height: 5px; background: #ccc; border-radius: 10px; margin: 0 auto 20px; }
    </style>
</head>
<body>

<div class="header">Insta Saver Tool</div>

<div class="container">
    <input type="text" id="instaLink" placeholder="Paste Post Link Here...">
    <button onclick="getImages()">Extract Photos</button>
</div>

<div id="selectionBox">
    <div class="close-bar" onclick="closeBox()"></div>
    <h3 style="margin-top:0">Select Photos</h3>
    <div id="imageGrid" class="grid"></div>
</div>

<script>
    async function getImages() {
        const url = document.getElementById('instaLink').value;
        if(!url) return alert("Link taka!");
        
        const btn = document.querySelector('button');
        btn.innerText = "Processing...";
        
        try {
            const response = await fetch('/api/get_images', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: url })
            });
            const data = await response.json();
            
            if(data.success) {
                const grid = document.getElementById('imageGrid');
                grid.innerHTML = '';
                data.images.forEach((img, i) => {
                    grid.innerHTML += `
                        <div class="grid-item">
                            <img src="${img}">
                            <a href="${img}" target="_blank" class="dl-btn">Save Image</a>
                        </div>
                    `;
                });
                document.getElementById('selectionBox').style.display = 'block';
            } else {
                alert("Error: " + data.error);
            }
        } catch (e) {
            alert("Something went wrong!");
        }
        btn.innerText = "Extract Photos";
    }

    function closeBox() {
        document.getElementById('selectionBox').style.display = 'none';
    }
</script>

</body>
</html>
